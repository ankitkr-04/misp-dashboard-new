<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MISP Security Operations Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --color-bg: #f1f5f9;
      --color-panel: #ffffff;
      --color-panel-subtle: #f8fafc;
      --color-border: #e2e8f0;
      --color-border-muted: rgba(226, 232, 240, 0.7);
      --color-accent: #2563eb;
      --color-accent-light: #dbeafe;
      --color-danger: #dc2626;
      --color-success: #16a34a;
      --color-warning: #d97706;
      --color-text-primary: #0f172a;
      --color-text-secondary: #475569;
      --color-text-muted: #94a3b8;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08), 0 1px 3px rgba(15, 23, 42, 0.04);
      --shadow-lg: 0 8px 24px rgba(15, 23, 42, 0.10), 0 2px 6px rgba(15, 23, 42, 0.05);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body,
    #root {
      margin: 0;
      min-height: 100%;
      width: 100%;
      background: var(--color-bg);
      color: var(--color-text-primary);
    }

    body {
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    ::selection {
      background: rgba(37, 99, 235, 0.15);
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .mono-ui {
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
    }

    /* Base panel — white card with crisp border */
    .panel-shell {
      background: var(--color-panel);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      box-shadow: var(--shadow-sm);
    }

    /* Subtle inner card used inside panels */
    .inner-card {
      background: var(--color-panel-subtle);
      border: 1px solid var(--color-border);
      border-radius: 8px;
    }

    /* Tag pill */
    .tag-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid rgba(37, 99, 235, 0.2);
      background: rgba(37, 99, 235, 0.06);
      color: #1d4ed8;
    }

    .cursor-blink {
      animation: blink 0.9s step-end infinite;
    }

    .fade-in-row {
      animation: fadeInRow 0.3s ease-out;
    }

    @keyframes blink {

      0%,
      49% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0;
      }
    }

    @keyframes fadeInRow {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
