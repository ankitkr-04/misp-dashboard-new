<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>MISP Security Operations Dashboard</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --color-bg: #f6f8fb;
        --color-panel: #ffffff;
        --color-panel-subtle: #f8fafc;
        --color-border: rgba(15, 23, 42, 0.1);
        --color-accent: #2563eb;
        --color-danger: #ef4444;
        --color-muted: #64748b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        width: 100%;
        background: var(--color-bg);
        color: #0f172a;
      }

      body {
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      ::selection {
        background: rgba(37, 99, 235, 0.18);
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.06);
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(100, 116, 139, 0.38);
        border-radius: 999px;
      }

      .mono-ui {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
      }

      .panel-shell {
        background: var(--color-panel);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      }

      .cursor-blink {
        animation: blink 0.9s step-end infinite;
      }

      .status-pulse {
        box-shadow: none;
      }

      .fade-in-highlight {
        animation: fadeInHighlight 0.65s ease-out;
      }

      .orbital-pulse {
        animation: none;
      }

      .app-light {
        color: #0f172a;
      }

      .app-light [class*="text-slate-100"],
      .app-light [class*="text-slate-50"],
      .app-light [class*="text-slate-200"] {
        color: #0f172a !important;
      }

      .app-light [class*="text-slate-300"],
      .app-light [class*="text-slate-400"] {
        color: #475569 !important;
      }

      .app-light [class*="text-slate-500"] {
        color: #64748b !important;
      }

      .app-light [class*="border-white/"],
      .app-light [class*="border-white\\\/"] {
        border-color: rgba(15, 23, 42, 0.1) !important;
      }

      .app-light [class*="bg-white/"],
      .app-light [class*="bg-white\\\/"] {
        background-color: #f8fafc !important;
      }

      .app-light .panel-shell {
        background: #ffffff;
        border-color: rgba(15, 23, 42, 0.1);
      }

      @keyframes blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }

      @keyframes statusPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.38);
        }
        70% {
          box-shadow: 0 0 0 12px rgba(0, 255, 136, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 255, 136, 0);
        }
      }

      @keyframes fadeInHighlight {
        0% {
          opacity: 0;
          transform: translateY(6px);
          background: rgba(0, 255, 136, 0.18);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
          background: transparent;
        }
      }

      @keyframes orbitalPulse {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(0.98);
        }
        50% {
          opacity: 1;
          transform: scale(1.02);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
