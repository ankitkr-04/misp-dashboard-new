<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>MISP Security Operations Dashboard</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --color-bg: #0a0f1a;
        --color-panel: rgba(255, 255, 255, 0.03);
        --color-border: rgba(255, 255, 255, 0.08);
        --color-accent: #00ff88;
        --color-danger: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        width: 100%;
        background:
          radial-gradient(circle at top, rgba(0, 255, 136, 0.08), transparent 30%),
          radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.08), transparent 35%),
          var(--color-bg);
        color: #e5f4ee;
      }

      body {
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      ::selection {
        background: rgba(0, 255, 136, 0.22);
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.04);
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(0, 255, 136, 0.28);
        border-radius: 999px;
      }

      .mono-ui {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
      }

      .panel-shell {
        background: var(--color-panel);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 0 24px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(14px);
      }

      .cursor-blink {
        animation: blink 0.9s step-end infinite;
      }

      .status-pulse {
        animation: statusPulse 1.8s ease-in-out infinite;
      }

      .fade-in-highlight {
        animation: fadeInHighlight 0.65s ease-out;
      }

      .orbital-pulse {
        animation: orbitalPulse 3.8s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }

      @keyframes statusPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.38);
        }
        70% {
          box-shadow: 0 0 0 12px rgba(0, 255, 136, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 255, 136, 0);
        }
      }

      @keyframes fadeInHighlight {
        0% {
          opacity: 0;
          transform: translateY(6px);
          background: rgba(0, 255, 136, 0.18);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
          background: transparent;
        }
      }

      @keyframes orbitalPulse {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(0.98);
        }
        50% {
          opacity: 1;
          transform: scale(1.02);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
